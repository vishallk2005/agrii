<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriDirect - Your Cart</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", Arial, sans-serif;
      background-color: #f1f3f6;
    }

    .cart-container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ADDRESS SECTION */
    .address-section {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .address-info h3 {
      margin: 0;
      color: #2c9869;
    }

    .address-actions button {
      background: #2c9869;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 10px;
    }

    /* CART MAIN AREA */
    .cart-main {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .cart-items {
      flex: 2;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }

    .cart-item-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .cart-item-left img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .remove-btn {
      background: #c0392b;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 6px;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .qty-btn {
      border: 1px solid #aaa;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      background: #eee;
    }

    .item-total {
      color: #2c9869;
      font-size: 18px;
      font-weight: bold;
    }

    .order-summary {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .checkout-btn {
      width: 100%;
      background: #fb641b;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 6px;
      font-size: 17px;
      cursor: pointer;
      margin-top: 20px;
    }

    /* PAYMENT SELECTION STYLING */
    .order-summary-payment {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    .payment-option {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #ccc;
      cursor: pointer;
      gap: 10px;
    }

    .payment-option.selected {
      border: 2px solid #2c9869;
      background: #e8f6ef;
    }

    .pay-text {
      font-size: 16px;
      font-weight: 500;
    }

    /* POPUP MESSAGE */
    #popupMsg {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c9869;
      padding: 12px 18px;
      color: #fff;
      border-radius: 8px;
      display: none;
      font-size: 15px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }

    /* ADDRESS MODAL STYLES */
    .address-modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
    }

    .address-modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .address-modal-content {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: modalSlideIn 0.3s ease-out;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-30px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .address-modal-content h3 {
      margin: 0 0 20px;
      color: #2c9869;
      font-size: 22px;
      text-align: center;
    }

    .address-modal-content input {
      width: 100%;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 20px;
      transition: border-color 0.3s ease;
    }

    .address-modal-content input:focus {
      outline: none;
      border-color: #2c9869;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .modal-buttons button[type="button"] {
      background: #f5f5f5;
      color: #666;
    }

    .modal-buttons button[type="button"]:hover {
      background: #e0e0e0;
    }

    .modal-buttons button[type="submit"] {
      background: #2c9869;
      color: white;
    }

    .modal-buttons button[type="submit"]:hover {
      background: #238557;
      transform: translateY(-1px);
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      color: #999;
      cursor: pointer;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      color: white;
      background: #2c9869;
      transform: rotate(90deg);
    }
  </style>
</head>

<body>

  <div id="popupMsg">Added to cart</div>

  <div class="cart-container">

    <!-- ADDRESS BOX -->
    <div class="address-section">
      <div class="address-info">
        <h3>Delivery Address</h3>
        <p id="addressText">Loading...</p>
      </div>
      <div class="address-actions">
        <button onclick="openChangeAddress()">Change</button>
        <button onclick="openAddAddress()">Add New</button>
      </div>
    </div>

    <!-- CART ITEMS + PRICE -->
    <div class="cart-main">

      <div class="cart-items" id="cartItems"></div>

      <div class="order-summary">
        <h2 style="color:#2c9869;">PRICE DETAILS</h2>

        <p>Subtotal: ₹<span id="subtotal">0</span></p>
        <p>Discount: ₹<span id="discount">0</span></p>

        <h3>Total: ₹<span id="total">0</span></h3>

        <button onclick="window.location.href='index.html'" style="background:#2c9869;color:#fff;border:none;border-radius:6px;
               padding:12px;width:100%;font-size:16px;margin-bottom:15px;">
          ← Continue Shopping
        </button>

        <!-- PAYMENT METHODS -->
        <h3 style="margin-top:20px;">Select Payment Method</h3>

        <div id="paymentMethods" class="order-summary-payment" role="radiogroup">

          <label class="payment-option" data-value="UPI">
            <input type="radio" name="payment" value="UPI" hidden>
            <span class="icon">💰</span>
            <span>UPI / Google Pay / PhonePe</span>
          </label>

          <label class="payment-option" data-value="Card">
            <input type="radio" name="payment" value="Card" hidden>
            <span class="icon">💳</span>
            <span>Debit / Credit Card</span>
          </label>

          <label class="payment-option" data-value="Cash on Delivery">
            <input type="radio" name="payment" value="Cash on Delivery" hidden>
            <span class="icon">📦</span>
            <span>Cash on Delivery</span>
          </label>

        </div>


        <button class="checkout-btn" onclick="proceedToPayment()">Proceed to Payment</button>
      </div>

    </div>
  </div>

  <!-- ADDRESS MODALS -->
  <!-- Change Address Modal -->
  <div id="changeAddressModal" class="address-modal">
    <div class="address-modal-content">
      <span class="close-modal" onclick="closeChangeAddressModal()">&times;</span>
      <h3>Change Delivery Address</h3>
      <form id="changeAddressForm">
        <input type="text" id="changeAddressInput" placeholder="Enter your new address" required>
        <div class="modal-buttons">
          <button type="button" onclick="closeChangeAddressModal()">Cancel</button>
          <button type="submit">Update Address</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add New Address Modal -->
  <div id="addAddressModal" class="address-modal">
    <div class="address-modal-content">
      <span class="close-modal" onclick="closeAddAddressModal()">&times;</span>
      <h3>Add New Delivery Address</h3>
      <form id="addAddressForm">
        <input type="text" id="addAddressInput" placeholder="Enter your delivery address" required>
        <div class="modal-buttons">
          <button type="button" onclick="closeAddAddressModal()">Cancel</button>
          <button type="submit">Add Address</button>
        </div>
      </form>
    </div>
  </div>

  <script>

    // Load cart & user
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let user = JSON.parse(localStorage.getItem("loggedInUser")) || {};

    document.getElementById("addressText").textContent =
      user.address || "No address saved.";

    // API Config
    const API_URL = 'http://localhost:3000/api';

    // Save order function (API)
    async function saveOrder(paymentMode) {
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      if (!user) return alert("Please login first!");

      const orderData = {
        username: user.username,
        items: cart.map(item => ({
          name: item.name,
          quantity: item.quantity,
          price: item.price,
          farmer: item.farmer_username || item.farmer || "Unknown"
        })),
        total: cart.reduce((s, i) => s + i.price * i.quantity, 0)
      };

      try {
        const response = await fetch(`${API_URL}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
        const result = await response.json();

        if (result.success) {
          // Clear cart
          cart = [];
          localStorage.setItem("cart", JSON.stringify([]));
          renderCart();
          updateCartCount();
          showPopup("Order placed successfully!");
        } else {
          alert("Failed to place order: " + result.error);
        }
      } catch (error) {
        console.error("Error placing order:", error);
        alert("Error placing order");
      }
    }

    // Render cart UI
    function renderCart() {
      const container = document.getElementById("cartItems");
      container.innerHTML = "";

      if (cart.length === 0) {
        container.innerHTML = `
      <div style="text-align:center; padding:40px;">
        <p style="font-size:18px; color:#555;">🛒 Your cart is empty.</p>
        <button onclick="window.location.href='index.html'"
                style="margin-top:15px;padding:12px 20px;background:#2c9869;color:#fff;
                       border:none;border-radius:6px;cursor:pointer;font-size:16px;">
          ← Continue Shopping
        </button>
      </div>
    `;
        return;
      }

      let subtotal = 0;

      cart.forEach((item, i) => {
        subtotal += item.price * item.quantity;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
      <div class="cart-item-left">
        <img src="${item.image || item.img}" alt="${item.name}">
        <div>
          <h3>${item.name}</h3>
          <p>₹${item.price}</p>
          <div class="quantity-controls">
            <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
          </div>
          <button class="remove-btn" onclick="removeFromCart(${i})">Remove</button>
        </div>
      </div>
      <div class="item-total">₹${(item.price * item.quantity).toFixed(2)}</div>
    `;

        container.appendChild(div);
      });

      const discount = subtotal > 500 ? 50 : 0;

      document.getElementById("subtotal").textContent = subtotal;
      document.getElementById("discount").textContent = discount;
      document.getElementById("total").textContent = subtotal - discount;

      localStorage.setItem("cart", JSON.stringify(cart));
    }

    // Qty change
    function changeQty(i, d) {
      cart[i].quantity += d;
      if (cart[i].quantity <= 0) cart.splice(i, 1);

      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function removeFromCart(i) {
      cart.splice(i, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    // Proceed button
    function proceedToPayment() {
      if (!user) return alert("⚠️ Please login first!");
      if (!user.address) return alert("⚠️ Please add your delivery address!");
      if (cart.length === 0) return alert("⚠️ Your cart is empty!");

      const paymentSelected = document.querySelector('.order-summary-payment input[name="payment"]:checked');
      if (!paymentSelected) return alert("⚠️ Please select a payment method!");

      saveOrder(paymentSelected.value);
    }

    function updateCartCount() {
      const count = cart.reduce((t, i) => t + i.quantity, 0);
      localStorage.setItem("cartCount", count);
    }

    function showPopup(msg) {
      const box = document.getElementById("popupMsg");
      box.textContent = msg;
      box.style.display = "block";
      setTimeout(() => box.style.display = "none", 1500);
    }

    renderCart();
    updateCartCount();

    /* PAYMENT SELECTION WORKING */
    const paymentRows = document.querySelectorAll(".payment-option");

    paymentRows.forEach(row => {
      row.addEventListener("click", () => {
        paymentRows.forEach(r => r.classList.remove("selected"));
        row.classList.add("selected");
        row.querySelector("input[type='radio']").checked = true;
      });
    });

    // ================= ADDRESS MANAGEMENT FUNCTIONS =================

    // Open Change Address Modal
    function openChangeAddress() {
      const modal = document.getElementById("changeAddressModal");
      modal.style.display = "flex";
      modal.classList.add("show");

      // Pre-fill current address
      const currentAddress = user.address || "";
      document.getElementById("changeAddressInput").value = currentAddress;
      document.getElementById("changeAddressInput").focus();
    }

    // Close Change Address Modal
    function closeChangeAddressModal() {
      const modal = document.getElementById("changeAddressModal");
      modal.style.display = "none";
      modal.classList.remove("show");
      document.getElementById("changeAddressForm").reset();
    }

    // Open Add Address Modal
    function openAddAddress() {
      const modal = document.getElementById("addAddressModal");
      modal.style.display = "flex";
      modal.classList.add("show");
      document.getElementById("addAddressInput").focus();
    }

    // Close Add Address Modal
    function closeAddAddressModal() {
      const modal = document.getElementById("addAddressModal");
      modal.style.display = "none";
      modal.classList.remove("show");
      document.getElementById("addAddressForm").reset();
    }

    // Handle Change Address Form Submission
    document.getElementById("changeAddressForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const newAddress = document.getElementById("changeAddressInput").value.trim();

      if (!newAddress) {
        alert("Please enter a valid address");
        return;
      }

      try {
        // Update user object in localStorage
        user.address = newAddress;
        localStorage.setItem("loggedInUser", JSON.stringify(user));

        // Update address display
        document.getElementById("addressText").textContent = newAddress;

        // Close modal
        closeChangeAddressModal();

        // Show success message
        showPopup("Address updated successfully!");

        // Optional: Update address in backend
        await updateUserAddressInBackend(newAddress);

      } catch (error) {
        console.error("Error updating address:", error);
        alert("Failed to update address. Please try again.");
      }
    });

    // Handle Add Address Form Submission
    document.getElementById("addAddressForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const newAddress = document.getElementById("addAddressInput").value.trim();

      if (!newAddress) {
        alert("Please enter a valid address");
        return;
      }

      try {
        // Update user object in localStorage
        user.address = newAddress;
        localStorage.setItem("loggedInUser", JSON.stringify(user));

        // Update address display
        document.getElementById("addressText").textContent = newAddress;

        // Close modal
        closeAddAddressModal();

        // Show success message
        showPopup("Address added successfully!");

        // Optional: Update address in backend
        await updateUserAddressInBackend(newAddress);

      } catch (error) {
        console.error("Error adding address:", error);
        alert("Failed to add address. Please try again.");
      }
    });

    // Update user address in backend (optional - for persistence)
    async function updateUserAddressInBackend(address) {
      try {
        const response = await fetch(`${API_URL}/users/${user.username}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address })
        });

        // Note: This requires the backend to have a PUT endpoint for updating user addresses
        // If the backend doesn't support this, the address will still be updated in localStorage
        if (!response.ok) {
          console.log("Backend address update not available, using localStorage only");
        }
      } catch (error) {
        console.log("Backend address update failed, using localStorage only");
      }
    }

    // Close modals when clicking outside
    window.addEventListener("click", function(event) {
      const changeModal = document.getElementById("changeAddressModal");
      const addModal = document.getElementById("addAddressModal");

      if (event.target === changeModal) {
        closeChangeAddressModal();
      }
      if (event.target === addModal) {
        closeAddAddressModal();
      }
    });

    // Close modals with Escape key
    document.addEventListener("keydown", function(event) {
      if (event.key === "Escape") {
        closeChangeAddressModal();
        closeAddAddressModal();
      }
    });
  </script>

</body>

</html>
